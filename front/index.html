<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影像报告生成系统</title>
    <link rel="stylesheet" href="/static/style.css?v=8" />
  </head>
  <body>
    <div class="app">
      <!-- 左侧导航 -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">🏥</div>
        <div class="sidebar-nav">
          <button
            class="sidebar-btn active"
            data-page="agent"
            title="Agent 对话"
          >
            <span class="sidebar-icon">💬</span>
            <span class="sidebar-label">Agent</span>
          </button>
          <button class="sidebar-btn" data-page="kb" title="知识库管理">
            <span class="sidebar-icon">📚</span>
            <span class="sidebar-label">知识库</span>
          </button>
          <button class="sidebar-btn" data-page="config" title="系统配置">
            <span class="sidebar-icon">⚙️</span>
            <span class="sidebar-label">配置</span>
          </button>
        </div>
      </nav>

      <!-- 右侧主区域 -->
      <div class="main">
        <!-- Agent 页面 -->
        <div class="page active" id="pageAgent">
          <header class="header">
            <h1>影像报告生成Agent</h1>
          </header>

          <div class="toolbar">
            <button id="btnClear" class="btn btn-outline">清空会话</button>
            <button id="btnMemory" class="btn btn-outline">短期记忆</button>
            <button
              id="btnConfigModel"
              class="btn btn-outline"
              title="配置模型"
            >
              ⚙️ 配置模型
            </button>
          </div>

          <div class="memory-panel" id="memoryPanel" style="display: none">
            <div class="memory-panel-header">
              <h3>短期记忆详情</h3>
              <button class="memory-panel-close" id="btnMemoryClose">✕</button>
            </div>
            <div class="memory-panel-body" id="memoryPanelBody">
              <div class="memory-loading">加载中...</div>
            </div>
          </div>

          <div class="chat-container" id="chatContainer">
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <p>输入CT/MRI等检查关键词，生成结构化影像报告</p>
              <p class="hint">例如：CT脑出血、MRI膝关节、脑梗</p>
            </div>
          </div>

          <div class="input-area">
            <textarea
              id="userInput"
              placeholder="输入检查关键词，如：CT脑出血、脑梗..."
              rows="2"
              autofocus
            ></textarea>
            <button id="btnSend" class="btn btn-primary">
              <span class="btn-text">发送</span>
              <span class="btn-loading" style="display: none"
                >⏳ 生成中...</span
              >
            </button>
          </div>

          <div class="status-bar" id="statusBar">
            <span id="statusText">就绪</span>
          </div>
        </div>

        <!-- 模型选择弹窗 -->
        <div class="llm-config-panel" id="llmConfigPanel" style="display: none">
          <div class="llm-config-header">
            <h3>当前激活模型配置</h3>
            <button class="llm-config-close" id="btnLlmConfigClose">✕</button>
          </div>
          <div class="llm-config-body" id="llmConfigBody">
            <div class="llm-config-row">
              <label class="llm-config-label">对话大语言模型</label>
              <select id="activeChatLlm" class="llm-config-select"></select>
            </div>
            <div class="llm-config-row">
              <label class="llm-config-label">向量化模型</label>
              <select id="activeEmbedding" class="llm-config-select"></select>
            </div>
            <div class="llm-config-row">
              <label class="llm-config-label">重排模型</label>
              <select id="activeRerank" class="llm-config-select"></select>
            </div>
            <div class="llm-config-actions">
              <span id="llmConfigHint" class="llm-config-hint"></span>
              <button
                type="button"
                class="btn btn-sm btn-primary"
                id="btnSaveLlmConfig"
              >
                保存
              </button>
            </div>
          </div>
        </div>

        <!-- 知识库页面 -->
        <div class="page" id="pageKB">
          <header class="header">
            <h1>知识库管理</h1>
            <p class="subtitle">管理报告模板、向量库与元数据</p>
          </header>

          <div class="kb-body">
            <div class="kb-status">
              <div class="kb-stat">
                <span class="kb-stat-label">向量总数</span>
                <span class="kb-stat-value" id="kbTotal">-</span>
              </div>
              <div class="kb-stat">
                <span class="kb-stat-label">切片文件</span>
                <span class="kb-stat-value" id="kbMdCount">-</span>
              </div>
              <div class="kb-stat">
                <span class="kb-stat-label">元数据</span>
                <span class="kb-stat-value" id="kbMeta">-</span>
              </div>
            </div>

            <div class="kb-files" id="kbFiles">
              <div class="kb-files-header">📁 服务器文件</div>
              <div class="kb-files-list" id="kbFilesList"></div>
            </div>

            <div class="kb-actions">
              <button
                id="btnUploadXlsx"
                class="btn btn-primary"
                title="上传 xlsx 模板文件，自动切片为 md 文件"
              >
                📤 上传xlsx
              </button>
              <button
                id="btnBuildIncremental"
                class="btn btn-primary"
                title="扫描新增切片，向量化后追加到向量库"
              >
                增量构建
              </button>
              <button
                id="btnBuildRebuild"
                class="btn btn-danger"
                title="清空向量库，全量重新向量化"
              >
                全量重建
              </button>
              <button
                id="btnExtractMeta"
                class="btn btn-outline"
                title="从 xlsx 提取元数据，生成 metadata.json"
              >
                提取元数据
              </button>
            </div>

            <input
              type="file"
              id="xlsxInput"
              accept=".xlsx"
              style="display: none"
            />

            <div class="kb-log" id="kbLog" style="display: none">
              <div class="kb-log-header">📋 执行日志</div>
              <div class="kb-log-content" id="kbLogContent"></div>
            </div>
          </div>
        </div>

        <!-- 配置页面 -->
        <div class="page" id="pageConfig">
          <header class="header">
            <h1>系统配置</h1>
            <p class="subtitle">
              多模型配置管理，选择一个激活使用，支持添加/删除
            </p>
          </header>

          <div class="config-body">
            <nav class="config-nav" id="configNav">
              <div class="config-nav-title">配置分类</div>
              <button class="config-nav-item active" data-config="llm">
                大语言模型配置
              </button>
              <button class="config-nav-item" data-config="retrieval">
                检索与向量化配置
              </button>
              <button class="config-nav-item" data-config="system">
                系统与功能配置
              </button>
            </nav>
            <div class="config-main" id="configForm">
              <!-- LLM 模型配置分组 -->
              <div class="config-group" id="configGroupLlm">
                <h2 class="config-group-title">大语言模型配置</h2>
                <div class="config-group-content">
                  <div class="config-section">
                    <div class="config-section-header">
                      <h3 class="config-section-title">LLM 模型列表</h3>
                      <button
                        type="button"
                        class="btn btn-sm btn-outline"
                        id="btnAddLlm"
                      >
                        + 添加 LLM
                      </button>
                    </div>
                    <div class="model-list" id="modelListLlms">
                      <!-- 动态生成 -->
                    </div>
                  </div>
                  <div class="config-section-hint" id="configHintLlm"></div>
                </div>
              </div>

              <!-- 检索配置分组 -->
              <div
                class="config-group"
                id="configGroupRetrieval"
                style="display: none"
              >
                <h2 class="config-group-title">检索与向量化配置</h2>
                <div class="config-group-content">
                  <!-- Embedding 模型列表 -->
                  <div class="config-section">
                    <div class="config-section-header">
                      <h3 class="config-section-title">Embedding 模型列表</h3>
                      <button
                        type="button"
                        class="btn btn-sm btn-outline"
                        id="btnAddEmbedding"
                      >
                        + 添加 Embedding
                      </button>
                    </div>
                    <div class="model-list" id="modelListEmbeddings">
                      <!-- 动态生成 -->
                    </div>
                  </div>

                  <!-- Rerank 模型列表 -->
                  <div class="config-section">
                    <div class="config-section-header">
                      <h3 class="config-section-title">Rerank 模型列表</h3>
                      <button
                        type="button"
                        class="btn btn-sm btn-outline"
                        id="btnAddRerank"
                      >
                        + 添加 Rerank
                      </button>
                    </div>
                    <div class="model-list" id="modelListReranks">
                      <!-- 动态生成 -->
                    </div>
                  </div>

                  <!-- 检索配置 -->
                  <div class="config-section">
                    <h3 class="config-section-title">检索参数配置</h3>
                    <div class="config-row">
                      <label class="config-label"
                        >向量检索召回数 (RAG topK)</label
                      >
                      <input
                        type="number"
                        class="config-input config-input-sm"
                        id="cfg_retrieval_rag_top_k"
                      />
                    </div>
                    <div class="config-row">
                      <label class="config-label">Rerank 后保留条数</label>
                      <input
                        type="number"
                        class="config-input config-input-sm"
                        id="cfg_retrieval_rerank_top_k"
                      />
                    </div>
                    <div class="config-row">
                      <label class="config-label">Milvus 集合名称</label>
                      <input
                        type="text"
                        class="config-input"
                        id="cfg_retrieval_collection_name"
                      />
                    </div>
                    <div class="config-row">
                      <label class="config-label">Milvus 数据库路径</label>
                      <input
                        type="text"
                        class="config-input"
                        id="cfg_retrieval_db_path"
                        placeholder="相对于项目根目录"
                      />
                    </div>
                  </div>
                  <div
                    class="config-section-hint"
                    id="configHintRetrieval"
                  ></div>
                </div>
              </div>

              <!-- 系统配置分组 -->
              <div
                class="config-group"
                id="configGroupSystem"
                style="display: none"
              >
                <h2 class="config-group-title">系统与功能配置</h2>
                <div class="config-group-content">
                  <!-- 短期记忆配置 -->
                  <div class="config-section">
                    <h3 class="config-section-title">短期记忆配置</h3>
                    <div class="config-row">
                      <label class="config-label">最大轮数</label>
                      <input
                        type="number"
                        class="config-input config-input-sm"
                        id="cfg_stm_max_rounds"
                      />
                    </div>
                    <div class="config-row">
                      <label class="config-label">实体权重衰减因子</label>
                      <input
                        type="number"
                        step="0.1"
                        class="config-input config-input-sm"
                        id="cfg_stm_decay_factor"
                      />
                    </div>
                  </div>
                  <div class="config-section-hint" id="configHintSystem"></div>
                </div>
              </div>

              <div class="config-actions">
                <div class="config-hint" id="configHint">
                  💾 修改配置后点击保存即可生效
                </div>
                <button
                  type="button"
                  id="btnSaveConfig"
                  class="btn btn-primary"
                >
                  💾 保存配置
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js?v=13"></script>
  </body>
</html>
